<!doctype html>
<html lang="{{ .Site.Language.Locale }}">
  <head>
    {{ partial "meta.html" . }}
    <title>
      {{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}
    </title>
  </head>
  <body>
    {{ partial "header.html" . }}
    <div id="content-wrap">
      {{ block "main" . }}{{ end }} {{ partial "footer.html" . }}
    </div>
    {{ partial "scripts.html" . }}
  </body>
</html>
