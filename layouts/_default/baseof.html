<!doctype html>
<html lang="{{ .Site.Language.Locale }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title
      }}{{ end }}
    </title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        color: #222;
        line-height: 175%;
      }
      a {
        color: #00838f;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }
      .site-header,
      .site-footer {
        padding: 1rem;
      }
      .site-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 1rem;
      }
      .site-title {
        margin: 0;
        font-size: 1.25rem;
      }
      .site-title a {
        text-decoration: none;
      }
      .site-nav ul {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin: 0;
        padding: 0;
      }
      .site-footer {
        font-size: 0.9rem;
      }
      .content-wrap {
        max-width: 1200px;
        margin: 0 auto;
      }
      main {
        padding: 1rem;
      }
      img {
        max-width: 100%;
      }
      .post-nav {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        margin: 1rem 0;
        font-size: 0.9rem;
      }
      .articles {
        list-style: none;
        gap: 0.5rem;
        margin: 0;
        padding: 0;
      }
      @media (min-width: 640px) {
        .content-wrap {
          display: flex;
          align-items: flex-start;
        }
        main {
          flex: 2;
        }
        .site-footer {
          flex: 1;
        }
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        vertical-align: bottom;
        font-size: 150%;
      }
      .latest-posts {
        list-style: none;
        padding-left: 1rem;
      }
      .pagination {
        list-style: none;
        padding-left: 1rem;
        display: flex;
        gap: 1rem;
        margin: 1rem 0;

        a {
          text-decoration: none;
        }
        .disabled,
        .active {
          a {
            color: lightsteelblue;
            cursor: default;
          }
        }
      }
      .return_index {
        margin: 0;
        padding: 0;
        text-align: right;
      }
      table {
        border-collapse: collapse;
        td {
          border: 1px solid lightsteelblue;
          padding: 0 0.5rem;
        }
        td:first-child {
          background-color: #ddddee;
        }
      }
    </style>
  </head>
  <body>
    {{ partial "header.html" . }}
    <div class="content-wrap">
      {{ block "main" . }}{{ end }} {{ partial "footer.html" . }}
    </div>
  </body>
</html>
