<nav class="post-nav">
  <span class="post-nav-prev"
    >{{ with .PrevInSection }}<a href="{{ .Permalink }}"
      >← 前の記事: {{ .Title }}</a
    >{{ end }}</span
  >
  <span class="post-nav-next"
    >{{ with .NextInSection }}<a href="{{ .Permalink }}"
      >次の記事: {{ .Title }} →</a
    >{{ end }}</span
  >
</nav>
