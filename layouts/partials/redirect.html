    window.location.replace('/job/');
  } else if (cat == "10") {
    window.location.replace('/blog/');
  } else if (/^\d+$/.test(pageId)) {
    switch (pageId) {

        break;
      case "4549":

        break;
      case "6821":

        break;
      default:
        window.location.replace('/');
        break;
    }

    window.location.replace(`/blog/${p}/`);
  } else if (/^\d+$/.test(p)) {
    window.location.replace(`/job/${p}/`);
  }
