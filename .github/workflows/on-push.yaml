name: Generate indexes
on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".vscode/**/*"
      - "docs/**/*"
      - "migration/**/*"
      - "sample/**/*"
      - "test/**/*"
      - "tools/**/*"
      - "README.md"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true
      - run: hugo
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Create ZIP
        run: |
          cd _site
          zip -r ../site.zip .
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: site.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
