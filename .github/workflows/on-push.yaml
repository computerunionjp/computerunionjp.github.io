name: Generate indexes
permissions:
  contents: write
on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".vscode/**/*"
      - "docs/**/*"
      - "migration/**/*"
      - "sample/**/*"
      - "test/**/*"
      - "tools/**/*"
      - "README.md"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true
      - run: hugo
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

      - name: Create ZIP
        run: |
          cd _site
          zip -r ../site.zip .
      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Build
          files: site.zip
          make_latest: true
          generate_release_notes: false
      - name: Update site
        run: |
          curl --fail --show-error --silent \
            "https://computer-union.jp/tools/update-site.php?token=${{ secrets.XSERVER_DEPLOY_TOKEN }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
